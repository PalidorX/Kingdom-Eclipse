name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Publishing to the gh-pages branch only needs write access to repo contents.
permissions:
  contents: write

# Let an in-progress publish finish rather than cancelling it mid-push.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # Publish the built site to the gh-pages branch. This bypasses the
      # actions/deploy-pages flow (which was timing out, then hard-failing)
      # and just pushes dist/ to a branch GitHub Pages serves directly.
      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
